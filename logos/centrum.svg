<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a2744" stroke="#1a2744" stroke-width="2"/>

  <!-- Inner circle accent -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>

  <!-- Stylized "C" with modern lines -->
  <g transform="translate(100, 100)">
    <!-- Main C curve -->
    <path d="M -20 -35 Q -40 -35 -45 -15 Q -48 0 -45 15 Q -40 35 -20 35 Q 0 35 15 25"
          fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Accent bar (modern touch) -->
    <rect x="15" y="-8" width="5" height="16" fill="#ffffff" rx="2.5"/>
  </g>

  <!-- Text: CENTRUM -->
  <text x="100" y="165" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="2">CENTRUM</text>
</svg>